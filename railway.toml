# ShariEstate API — Railway config
# Uses Dockerfile to avoid Nixpacks building the whole monorepo (Next.js + pnpm script issues)

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
# Must match Dockerfile WORKDIR (/app/apps/api) and nest build output (dist/main.js)
startCommand = "node dist/main.js"
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10

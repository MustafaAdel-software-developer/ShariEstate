# ShariEstate API — Railway config
# Uses Dockerfile to avoid Nixpacks building the whole monorepo (Next.js + pnpm script issues)

[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 10
